security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    role_hierarchy:
        ROLE_ADMIN: ROLE_USER

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: username

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        login:
            pattern: ^/api/login
            stateless: true
            login_throttling:
                max_attempts: 5
                interval: '1 minute'
            json_login:
                check_path: /api/login
                username_path: username
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure
        api:
            pattern: ^/api
            stateless: true
            jwt: ~

    access_control:
        # Public routes
        - { path: ^/api/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/register, roles: PUBLIC_ACCESS }
        - { path: ^/api/contact, roles: PUBLIC_ACCESS }
        # Public read-only API routes (GET)
        - { path: ^/api/football, roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/sports, roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/leagues, roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/matches, roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/comments, roles: PUBLIC_ACCESS, methods: [GET] }
        # Admin routes
        - { path: ^/api/admin, roles: ROLE_ADMIN }
        # Authenticated routes
        - { path: ^/api, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
